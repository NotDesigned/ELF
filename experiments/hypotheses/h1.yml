schema_version: 1
id: H1
title: 句子级 plan 能否改善全局 token denoising，并避免 latent collapse？
motivation: >-
  STAR-LDM 的 learned sentence encoder 在自回归解码器下坍缩到近常数
  （emb_batch_var ≈ 9.85e-7），因为 teacher-forcing 前缀提供了局部旁路，
  且 CE 是唯一训练信号。ELF 的全局去噪解码器移除了该旁路：plan 必须帮助
  去噪有 grounding 的冻结 T5 token 场，从而获得稠密的抗坍缩全局梯度。
  本假设检验在此拓扑下句子 plan 是否 (a) 可学、(b) 携带真实内容、
  (c) 相对纯 ELF 基线不损害 token 指标。
falsifiable_when: >-
  以下任一成立即倾向拒绝：learned-plan 运行中 train_plan_emb_batch_var
  持续趋向 0（坍缩复现）；oracle_plan_ppl 不显著低于 shuffled_plan_ppl
  （plan_ppl_gap ≤ 0，plan 未携带内容）；或 learned-plan 的 token 指标
  （train_ce_loss / g_ppl / token_recon_ppl）相对 a0 纯 ELF 基线在匹配
  预算下明显恶化。
verdict: PENDING
verdict_note: ""
campaigns:
  - name: fusion-len256-gate-h100-20260711
    file: experiments/campaigns/fusion_len256_gate_h100_20260711.yml
    role_notes:
      a0: pure ELF baseline（无 plan 对照）
      a1: frozen Sentence-T5 teacher（plan 通路 sanity / 上界参考）
      a2: learned plan + 1 detached aux pass（主假设）
      a3: learned plan without aux（aux 必要性消融）
