schema_version: 1
campaign: fusion-len256-gate-slurm-{instance}
instance: "{instance}"
project: elf
source_id: auto
local_root: outputs/experiment_campaigns

# The contract names only normalized evidence emitted by the ELF project
# adapter. Conservative zero/finite gates are intentional; stronger numerical
# thresholds require an explicitly reviewed scientific update.
research_contract:
  schema_version: 1
  question: >-
    Can frozen and learned sentence plans pass the one-epoch viability gate,
    and is one detached auxiliary pass necessary for learned-plan viability?
  required_roles: [a0, a1, a2, a3]
  required_metrics:
    common:
      - train_loss
      - steps_per_sec
      - g_ppl
      - generation_mean_entropy
      - generation_nonempty_fraction
      - token_recon_ppl
    by_role:
      a1: [oracle_plan_ppl, shuffled_plan_ppl]
      a2:
        - oracle_plan_ppl
        - shuffled_plan_ppl
        - train_plan_emb_batch_var
        - train_plan_emb_norm
      a3:
        - oracle_plan_ppl
        - shuffled_plan_ppl
        - train_plan_emb_batch_var
        - train_plan_emb_norm
  required_artifacts:
    common:
      train_metrics: {min_records: 1}
      evaluation_metrics: {min_records: 1}
      generated_samples: {min_nonempty_records: 1}
      reconstructed_samples: {min_nonempty_records: 1}
  terminal_checks:
    - {metric: steps_per_sec, op: gt, value: 0}
    - {metric: generation_nonempty_fraction, op: gt, value: 0}
    - {metric: generation_mean_entropy, op: gt, value: 0}
    - roles: [a1, a2, a3]
      left: oracle_plan_ppl
      op: lt
      right: shuffled_plan_ppl
    - roles: [a2, a3]
      metric: train_plan_emb_batch_var
      op: gt
      value: 0
    - roles: [a2, a3]
      metric: train_plan_emb_norm
      op: gt
      value: 0
  early_stop:
    - metrics: [train_loss, train_l2_loss, train_ce_loss, train_plan_loss, train_plan_aux_loss]
      op: any_nonfinite
  checkpoint: {required_on_success: true}
  comparison:
    match_fields:
      - source_id
      - image_id
      - resolved_config.seed
      - resolved_config.max_length
      - resolved_config.global_batch_size
      - resolved_config.epochs
      - resolved_config.grad_accum_steps
      - resolved_config.save_freq
      - resolved_config.eval_freq
      - resolved_config.num_samples
      - resolved_config.reconstruction_num_samples
      - backend.kind
      - backend.partition
      - backend.gres

defaults:
  config_overrides:
    - epochs=1
    - grad_accum_steps=2
    - save_freq=0.1
    - eval_freq=1
    - num_samples=256
    - reconstruction_num_samples=256
    - train_sampling_eval_freq=2000
    - train_sampling_eval_num_samples=64
    - train_sampling_eval_batch_size=16
  image_id: sha256:1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4
  resources: {gpus: 4, nodes: 1, cpus: 32}
  env:
    LOG_FREQ: "100"
    NUM_WORKERS: "8"
    REQUIRE_OFFLINE_CACHE: "1"
    USE_WANDB: "false"
  storage:
    run_dir: /data/liangluocheng/elf/runs/{run_id}
  retry: {max_infra_retries: 0}

profiles:
  wyd-l40s:
    storage:
      data_root: /data/liangluocheng
      project_data_root: /data/liangluocheng/elf
      hf_home: /data/liangluocheng/elf/cache/huggingface
      hf_datasets_cache: /data/liangluocheng/elf/cache/huggingface/datasets
    backend:
      kind: slurm
      ssh_alias: wyd-l40s
      partition: l40s
      account: lab
      qos: normal
      gres: gpu:l40s:4
      time: "24:00:00"
      mount_root: /data
      source_dir: /data/liangluocheng/elf/sources/{source_id}
      sif_path: /data/liangluocheng/elf/images/1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4.sif

runs:
  - matrix:
      variant:
        - role: a0
          run_id: elf-a0-pure-l256-s42-{instance}
          config: src/configs/training_configs/ablations/owt_elfb/tier0_0_pure_elf_len256.yml
        - role: a1
          run_id: elf-a1-frozen-t5-l256-s42-{instance}
          config: src/configs/training_configs/ablations/owt_elfb/tier0_1_sentence_t5_len256.yml
        - role: a2
          run_id: elf-a2-learned-l256-s42-{instance}
          config: src/configs/training_configs/ablations/owt_elfb/tier0_2_learned_main_len256.yml
        - role: a3
          run_id: elf-a3-aux0-l256-s42-{instance}
          config: src/configs/training_configs/ablations/owt_elfb/tier3_aux0_len256.yml
    template:
      profile: wyd-l40s
      research_role: "{variant.role}"
      run_id: "{variant.run_id}"
      config: "{variant.config}"
