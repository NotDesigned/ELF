schema_version: 1
id: Q1
title: 句子级 plan 是否为全局 token denoising 提供有效信息？
status: OPEN
summary: >-
  STAR-LDM 的 learned sentence encoder 在自回归解码器下坍缩到近常数
  （emb_batch_var ≈ 9.85e-7），因为 teacher-forcing 前缀提供了局部旁路，
  且 CE 是唯一训练信号。ELF 的全局去噪解码器移除了该旁路：plan 必须帮助
  去噪有 grounding 的冻结 T5 token 场，从而获得稠密的抗坍缩全局梯度。
  本假设检验在此拓扑下句子 plan 是否 (a) 可学、(b) 携带真实内容、
  (c) 相对纯 ELF 基线不损害 token 指标。
notes:
  - >-
    可关注 learned-plan 的 train_plan_emb_batch_var、oracle/shuffled plan PPL 差异，
    以及相对 a0 的 train_ce_loss、g_ppl 和 token_recon_ppl；这些是分析线索，
    不是 ResearchQuestion 的强制 schema gate。
  - >-
    2026-07-15 的配对 H200 确认性评测（32/64 steps，各 seed=42/123/456）
    否定了“增加 detached plan denoiser passes 可恢复有用 plan conditioning 且不损害
    生成”的具体假设。相对 aux0，aux1 的配对 gPPL 平均恶化 91.20（32 steps）/
    83.93（64 steps），aux2 恶化 147.53/121.25；aux2 的非空生成比例也在所有
    seed 上下降。oracle-shuffled 配对 gap 对 aux1/aux2 没有稳定正效应，而
    token_recon_ppl 基本不变（约 20.017-20.018），把问题定位到生成/plan 动力学，
    而不是 token autoencoding。Q1 仍保持 OPEN，但后续不应继续沿增加
    plan_aux_passes 的方向扩展。
