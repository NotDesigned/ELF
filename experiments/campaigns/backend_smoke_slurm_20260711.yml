schema_version: 1
campaign: backend-smoke-slurm-20260711
project: elf
source_id: auto
local_root: outputs/experiment_campaigns

defaults:
  config: src/configs/training_configs/ablations/owt_elfb/tier0_0_pure_elf_len256.yml
  config_overrides:
    - epochs=1
    - online_eval=false
    - reconstruction_eval=false
  image_id: sha256:1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4
  resources: {gpus: 1, cpus: 8}
  env:
    BATCH_SIZE: "4"
    LOG_FREQ: "10"
    REQUIRE_OFFLINE_CACHE: "1"
    USE_WANDB: "false"
  storage:
    run_dir: /data/liangluocheng/elf/runs/{run_id}
  retry: {max_infra_retries: 0}

profiles:
  wyd-common:
    backend:
      kind: slurm
      # SSH is only the login route. Compute placement remains explicit in the
      # accelerator profile layered after this common profile.
      ssh_alias: wyd-l40s
      account: lab
      qos: normal
      time: "00:10:00"
      source_dir: /data/liangluocheng/elf/sources/{source_id}
      sif_path: /data/liangluocheng/elf/images/1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4.sif
      data_root: /data/liangluocheng
      project_data_root: /data/liangluocheng/elf
      hf_home: /data/liangluocheng/elf/cache/huggingface
      hf_datasets_cache: /data/liangluocheng/elf/cache/huggingface/datasets
  rtx5880:
    backend:
      partition: rtx5880
      gres: gpu:rtx5880:1
  l40s:
    backend:
      partition: l40s
      gres: gpu:l40s:1

runs:
  - run_id: elf-smoke-slurm-0711-1636
    profile: [wyd-common, rtx5880]

  - run_id: elf-smoke-slurm-l40s-0711-1642
    profile: [wyd-common, l40s]
    # Preserve the exact staged training tree across the operational sbatch-log
    # retry; only the controller-rendered attempt script changes.
    source_id: fe73180e7204f8aeec3c255e0f49a1b81e6aa9e8-dirty.2e515b3dfd3066b6

  - run_id: elf-smoke-slurm-l40s-0711-1648
    profile: [wyd-common, l40s]
    source_id: fe73180e7204f8aeec3c255e0f49a1b81e6aa9e8-dirty.2e515b3dfd3066b6

  - run_id: elf-smoke-slurm-l40s-0711-1655
    profile: [wyd-common, l40s]
    config_overrides:
      - data_path=/data/liangluocheng/elf/datasets/smoke-owt-tokenized-v1
      - epochs=1
      - online_eval=false
      - reconstruction_eval=false
      - num_samples=4
    env:
      NUM_WORKERS: "0"
