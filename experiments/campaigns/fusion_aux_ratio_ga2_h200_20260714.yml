schema_version: 1
campaign: fusion-aux-ratio-ga2-h200-20260714-c2
project: elf

# Clean replacement for c1 after its aux0 submission became reconciliation-
# required before reaching Slurm. Scientific identity is unchanged; only the
# campaign/run identities are new so the uncertain Action cannot be replayed.
source_id: e44db5b272df3b6a196e8f58addc54446003595f
git_commit: e44db5b272df3b6a196e8f58addc54446003595f
local_root: outputs/experiment_campaigns

research_contract:
  schema_version: 1
  question: >-
    Does increasing detached learned-plan denoiser passes from zero to one or
    two recover sample-dependent plan predictions and useful causal plan
    conditioning without degrading the token field?
  required_roles: [aux0, aux1, aux2]
  required_metrics:
    common:
      - train_loss
      - train_l2_loss
      - train_ce_loss
      - train_plan_loss
      - train_plan_aux_loss
      - train_plan_emb_batch_var
      - train_plan_emb_norm
      - train_plan_pred_batch_var
      - train_plan_pred_norm
      - steps_per_sec
      - g_ppl
      - oracle_plan_ppl
      - shuffled_plan_ppl
      - generation_mean_entropy
      - generation_nonempty_fraction
      - token_recon_ppl
  required_artifacts:
    common:
      train_metrics: {min_records: 1}
      evaluation_metrics: {min_records: 1}
      generated_samples: {min_nonempty_records: 1}
      reconstructed_samples: {min_nonempty_records: 1}
  terminal_checks:
    - {metric: steps_per_sec, op: gt, value: 0}
    - {metric: generation_nonempty_fraction, op: gt, value: 0}
    - {metric: generation_mean_entropy, op: gt, value: 0}
    - {left: oracle_plan_ppl, op: lt, right: shuffled_plan_ppl}
    - {metric: train_plan_emb_batch_var, op: gt, value: 0}
    - {metric: train_plan_emb_norm, op: gt, value: 0}
  early_stop:
    - metrics: [train_loss, train_l2_loss, train_ce_loss, train_plan_loss, train_plan_aux_loss]
      op: any_nonfinite
  checkpoint: {required_on_success: true}
  comparison:
    match_fields:
      - source_id
      - image_id
      - resolved_config.seed
      - resolved_config.max_length
      - resolved_config.global_batch_size
      - resolved_config.epochs
      - resolved_config.grad_accum_steps
      - resolved_config.sentence_encoder_type
      - resolved_config.sentence_encoder_grad
      - resolved_config.plan_aux_token_context
      - resolved_config.plan_adapter_type
      - resolved_config.num_plan_tokens
      - resolved_config.save_freq
      - resolved_config.eval_freq
      - resolved_config.num_samples
      - resolved_config.reconstruction_num_samples
      - backend.kind
      - backend.partition
      - backend.gres

defaults:
  config_overrides:
    - epochs=1
    - global_batch_size=512
    - grad_accum_steps=2
    - save_freq=0.1
    - eval_freq=1
    - num_samples=256
    - reconstruction_num_samples=256
    - train_sampling_eval_freq=2000
    - train_sampling_eval_num_samples=64
    - train_sampling_eval_batch_size=16
  image_id: sha256:1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4
  resources: {gpus: 4, nodes: 1, cpus: 32}
  env:
    LOG_FREQ: "100"
    NUM_WORKERS: "8"
    REQUIRE_OFFLINE_CACHE: "1"
    USE_WANDB: "false"
  storage:
    run_dir: /datapool/liangluocheng/elf/runs/{run_id}
  retry: {max_infra_retries: 0}

profiles:
  wyd-h200:
    storage:
      data_root: /datapool/liangluocheng
      project_data_root: /datapool/liangluocheng/elf
      hf_home: /datapool/liangluocheng/.cache/huggingface
      hf_datasets_cache: /datapool/liangluocheng/.cache/huggingface/datasets
    backend:
      kind: slurm
      ssh_alias: wyd-h200
      partition: h200
      account: lab
      qos: normal
      gres: gpu:h200:4
      time: "24:00:00"
      mount_root: /datapool
      apptainer_cache_dir: /datapool/liangluocheng/elf/apptainer/cache
      apptainer_tmp_dir: /datapool/liangluocheng/elf/apptainer/tmp
      source_dir: /datapool/liangluocheng/elf/sources/{source_id}
      sif_path: /datapool/liangluocheng/elf/images/1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4.sif

runs:
  - run_id: elf-aux0-mb64-ga2-h200-20260714-r2
    research_role: aux0
    profile: wyd-h200
    config: src/configs/training_configs/ablations/owt_elfb/tier3_aux0_len256.yml
  - run_id: elf-aux1-mb64-ga2-h200-20260714-r2
    research_role: aux1
    profile: wyd-h200
    config: src/configs/training_configs/ablations/owt_elfb/tier0_2_learned_main_len256.yml
  - run_id: elf-aux2-mb64-ga2-h200-20260714-r2
    research_role: aux2
    profile: wyd-h200
    config: src/configs/training_configs/ablations/owt_elfb/tier3_aux2_len256.yml
