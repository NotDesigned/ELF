schema_version: 1
campaign: fusion-a1-warmstart-a0-h100-20260712-c2
project: elf

# Mechanism check: start both arms from the same completed pure-ELF checkpoint
# so the comparison isolates adding a frozen Sentence-T5 plan to a competent
# token model. This is a warm start, not a resume; optimizer/step/RNG state are
# deliberately fresh and both arms receive the same additional training epoch.
source_id: e44db5b272df3b6a196e8f58addc54446003595f
git_commit: e44db5b272df3b6a196e8f58addc54446003595f
local_root: outputs/experiment_campaigns

research_contract:
  schema_version: 1
  question: >-
    Given the same fully trained pure-ELF token backbone, can a frozen
    Sentence-T5 plan preserve token/generation viability and produce evidence
    worth a paired causal plan-conditioning evaluation?
  required_roles: [a0_warm, a1_warm]
  required_metrics:
    common:
      - train_loss
      - train_l2_loss
      - train_ce_loss
      - steps_per_sec
      - g_ppl
      - generation_mean_entropy
      - generation_nonempty_fraction
      - token_recon_ppl
    by_role:
      a1_warm:
        - oracle_plan_ppl
        - shuffled_plan_ppl
  required_artifacts:
    common:
      train_metrics: {min_records: 1}
      evaluation_metrics: {min_records: 1}
      generated_samples: {min_nonempty_records: 1}
      reconstructed_samples: {min_nonempty_records: 1}
  terminal_checks:
    - {metric: steps_per_sec, op: gt, value: 0}
    - {metric: generation_nonempty_fraction, op: gt, value: 0.95}
    - {metric: generation_mean_entropy, op: gt, value: 3.0}
  early_stop:
    - metrics: [train_loss, train_l2_loss, train_ce_loss, train_plan_loss]
      op: any_nonfinite
  checkpoint: {required_on_success: true}
  comparison:
    match_fields:
      - source_id
      - image_id
      - resolved_config.seed
      - resolved_config.max_length
      - resolved_config.global_batch_size
      - resolved_config.epochs
      - resolved_config.grad_accum_steps
      - resolved_config.warm_start
      - resolved_config.warm_start_use_ema
      - resolved_config.save_freq
      - resolved_config.eval_freq
      - resolved_config.num_samples
      - resolved_config.reconstruction_num_samples
      - backend.kind
      - backend.partition
      - backend.gres

defaults:
  config_overrides:
    - epochs=1
    - global_batch_size=512
    - grad_accum_steps=1
    - warm_start=/datapool/liangluocheng/elf/runs/elf-a0-pure-l256-s42-h100-v1/checkpoint_19017
    - warm_start_use_ema=false
    - save_freq=0.1
    - eval_freq=1
    - num_samples=256
    - reconstruction_num_samples=256
    - train_sampling_eval_freq=2000
    - train_sampling_eval_num_samples=64
    - train_sampling_eval_batch_size=16
  image_id: sha256:1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4
  resources: {gpus: 4, cpus: 32}
  env:
    LOG_FREQ: "100"
    NUM_WORKERS: "8"
    REQUIRE_OFFLINE_CACHE: "1"
    USE_WANDB: "false"
  storage:
    run_dir: /datapool/liangluocheng/elf/runs/{run_id}
  retry: {max_infra_retries: 0}

profiles:
  wyd-h100:
    storage:
      data_root: /datapool/liangluocheng
      project_data_root: /datapool/liangluocheng/elf
      hf_home: /datapool/liangluocheng/.cache/huggingface
      hf_datasets_cache: /datapool/liangluocheng/.cache/huggingface/datasets
    backend:
      kind: slurm
      ssh_alias: wyd-l40s
      partition: h100
      account: lab
      qos: normal
      gres: gpu:h100:4
      time: "24:00:00"
      mount_root: /datapool
      apptainer_cache_dir: /datapool/liangluocheng/elf/apptainer/cache
      apptainer_tmp_dir: /datapool/liangluocheng/elf/apptainer/tmp
      source_dir: /datapool/liangluocheng/elf/sources/{source_id}
      sif_path: /datapool/liangluocheng/elf/images/1e25f456cd26219ff89015a41b8653efb0db4444f911522802f850a791710de4.sif

runs:
  - run_id: elf-a1-warm-a0ckpt19017-l256-s42-h100-20260712-r2
    research_role: a1_warm
    profile: wyd-h100
    config: src/configs/training_configs/ablations/owt_elfb/tier0_1_sentence_t5_len256.yml
  - run_id: elf-a0-warm-a0ckpt19017-l256-s42-h100-20260712-r2
    research_role: a0_warm
    profile: wyd-h100
    config: src/configs/training_configs/ablations/owt_elfb/tier0_0_pure_elf_len256.yml
