schema_version: 1
project: elf
title: ELF plan-token fusion
run_roots:
  - outputs/experiment_campaigns
controller:
  python: /opt/ml-expd/venv/bin/python
  experimentctl: tools/experimentctl.py
  workdir: .
  capabilities:
    submit_outbox: true
    run_identity_v2: true
    authored_campaign_revision: true
    cancel_outbox: true
    evaluate: false
    refresh_evidence_local: true
  execution_bundle:
    entry_module: elf_experiments.controller
    paths:
      - tools/experimentctl.py
      - src/elf_experiments
      - src/configs
    python_packages:
      - yaml
    require_clean_git: true
campaigns:
  - name: fusion-hierarchical-prefix128-plan-lead-h200-20260715-c2
    file: experiments/campaigns/fusion_hierarchical_prefix128_plan_lead_h200_20260715.yml
    role_notes:
      joint_aligned: prefix128 conditional control with joint plan/future attention
      triangular_aligned: matched prefix -> plan -> future topology with aligned time
      triangular_lead_g3: matched prefix topology plus gamma-3 plan-leading time
  - name: fusion-hierarchical-prefix128-plan-lead-smoke-h200-20260715-c2
    file: experiments/campaigns/fusion_hierarchical_prefix128_plan_lead_smoke_h200_20260715.yml
    role_notes:
      joint_aligned: operational conditional joint-attention control
      triangular_aligned: operational prefix mask and block-triangular treatment
      triangular_lead_g3: operational prefix topology plus gamma-3 schedule treatment
  - name: fusion-hierarchical-plan-lead-h200-20260715-c2
    file: experiments/campaigns/fusion_hierarchical_plan_lead_h200_20260715.yml
    role_notes:
      joint_aligned: shared-trunk bidirectional attention with aligned plan/token time
      triangular_aligned: matched shared-trunk block-triangular attention with aligned time
      triangular_lead_g3: matched block-triangular treatment with gamma-3 plan-leading time
  - name: fusion-hierarchical-plan-lead-smoke-h200-20260715-c2
    file: experiments/campaigns/fusion_hierarchical_plan_lead_smoke_h200_20260715.yml
    role_notes:
      joint_aligned: operational joint-attention control
      triangular_aligned: operational mask and prefix-plumbing treatment
      triangular_lead_g3: operational mask plus gamma-3 schedule treatment
  - name: fusion-independent-plan-denoiser-h200-20260715-c2
    file: experiments/campaigns/fusion_independent_plan_denoiser_h200_20260715_c2.yml
    role_notes:
      shared: frozen-T5 shared-trunk control on four matched H200 GPUs
      independent: matched-depth independent plan-only ELF treatment on the same H200 resource shape
  - name: fusion-independent-plan-denoiser-smoke-h200-20260715-c2
    file: experiments/campaigns/fusion_independent_plan_denoiser_smoke_h200_20260715_c2.yml
    role_notes:
      shared: clean H200 smoke after immutable source staging was verified
